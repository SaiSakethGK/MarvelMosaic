<div class="row g-4">
  {% for character in characters %}
    {% if character.description and character.thumbnail.path and character.thumbnail.extension %}
      <div class="col-md-6 col-lg-4">
        <a href="{% url 'character_detail' character.id %}"
           class="character-card card-dark d-block p-3"
           style="text-decoration:none;height:100%;">
          <div class="d-flex gap-3">
            <img src="{{ character.thumbnail.path }}.{{ character.thumbnail.extension }}"
                 alt="{{ character.name }}"
                 loading="lazy"
                 style="width:110px;height:110px;object-fit:cover;
                        border-radius:6px;flex-shrink:0;">
            <div style="overflow:hidden;min-width:0;">
              <h6 class="name mb-2">{{ character.name }}</h6>
              <p class="desc mb-0">{{ character.description }}</p>
            </div>
          </div>
        </a>
      </div>
    {% endif %}
  {% endfor %}
</div>
